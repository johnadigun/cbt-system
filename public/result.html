<!DOCTYPE html>
<html>
<head>
<title>Result SaaS</title>

<style>
body { font-family:Arial; background:#f4f4f4; text-align:center; padding:30px; }

.card {
background:white;
padding:20px;
width:300px;
margin:auto;
border-radius:10px;
}
</style>
</head>

<body>

<div class="card">

<h2>Exam Result</h2>

<p id="score"></p>
<p id="percent"></p>
<p id="status"></p>

<button onclick="window.print()">Download</button>

</div>

<script>

let score=localStorage.getItem("score");
let total=localStorage.getItem("total");
let percent=localStorage.getItem("percent");

document.getElementById("score").innerText=score+"/"+total;
document.getElementById("percent").innerText=percent+"%";

document.getElementById("status").innerText=
percent>=50?"PASS":"FAIL";

</script>

</body>
</html>
