<!DOCTYPE html>
<html>
<head>
<title>Result SaaS</title>

<style>
body { font-family:Arial; background:#f4f4f4; text-align:center; padding:30px; }

.card {
background:white;
padding:20px;
width:300px;
margin:auto;
border-radius:10px;
}
</style>
</head>

<body>

<div class="card">

<h2>Exam Result</h2>

<p id="score"></p>
<p id="percent"></p>
<p id="status"></p>

<button onclick="window.print()">Download</button>

</div>

<script>

// ================= SAFE DATA =================
let score = parseInt(localStorage.getItem("score")) || 0;
let total = parseInt(localStorage.getItem("total")) || 0;
let percent = parseFloat(localStorage.getItem("percent")) || 0;

// ================= DISPLAY =================
document.getElementById("score").innerText = score + "/" + total;
document.getElementById("percent").innerText = percent.toFixed(2) + "%";

// ================= STATUS =================
let statusText = "FAIL";

if (percent >= 50) {
    statusText = "PASS";
}

document.getElementById("status").innerText = statusText;

</script>

</body>
</html>
