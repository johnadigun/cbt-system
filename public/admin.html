<!DOCTYPE html>
<html>
<head>
<title>Admin Monitor</title>

<style>
body { font-family: Arial; background:#0f172a; color:white; margin:0; }
.header { padding:15px; background:#111827; }
.card { padding:15px; margin:10px; background:#111827; border-radius:10px; }
</style>
</head>

<body>

<div class="header">
CBT ADMIN LIVE MONITOR
</div>

<div class="card">
Users: <span id="users">0</span><br>
Paid: <span id="paid">0</span><br>
Active: <span id="active">0</span>
</div>

<div class="card">
<h3>Active Students</h3>
<ul id="activeUsers"></ul>
</div>

<div class="card">
<h3>Recent Results</h3>
<ul id="results"></ul>
</div>

<script>

const adminToken = localStorage.getItem("adminToken");

if(!adminToken){
alert("Unauthorized");
window.location="/admin-login.html";
}

function load(){

fetch("/admin/realtime", {
headers:{
"admin-token": adminToken
}
})
.then(r => r.json())
.then(d => {

document.getElementById("users").innerText = d.totalUsers;
document.getElementById("paid").innerText = d.paidUsers;
document.getElementById("active").innerText = d.activeSessions;

let u = "";
d.activeUsers.forEach(x=>{
u += `<li>🟢 ${x}</li>`;
});
document.getElementById("activeUsers").innerHTML = u;

let r = "";
d.recentResults.forEach(x=>{
r += `<li>${x.email} → ${x.subject} → ${x.percent}%</li>`;
});
document.getElementById("results").innerHTML = r;

});

}

setInterval(load, 3000);
load();

</script>

</body>
</html>
