<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<style>
body { font-family: Arial; padding:20px; }
.box { border:1px solid #ccc; padding:10px; margin-bottom:10px; }
</style>
</head>
<body>

<h2>CBT Admin Panel</h2>

<div id="data"></div>

<script>

fetch("/admin")
.then(r=>r.json())
.then(d=>{

    let html = `
    <div class="box">
        <h3>Total Users: ${d.totalUsers}</h3>
        <h3>Active Exams: ${d.activeSessions.length}</h3>
    </div>`;

    d.users.forEach(u=>{
        html += `
        <div class="box">
            ${u.email}<br>
            Paid: ${u.paid}<br>
            Expires: ${u.expiresAt || "N/A"}
        </div>`;
    });

    document.getElementById("data").innerHTML = html;
});

</script>

</body>
</html>
