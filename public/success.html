<!DOCTYPE html>
<html>
<head>
    <title>Payment Verification</title>
</head>
<body>

<h2>Processing Payment...</h2>
<p id="msg">Please wait while we confirm your payment.</p>

<script>

// ================= GET REFERENCE =================
const urlParams = new URLSearchParams(window.location.search);
const reference = urlParams.get("reference");

const msg = document.getElementById("msg");

if (!reference) {
    msg.innerText = "Missing payment reference. Please retry payment.";
} else {

    msg.innerText = "Verifying payment...";

    // ================= CALL BACKEND VERIFY =================
    fetch("/verify?reference=" + encodeURIComponent(reference))
    .then(function(res){
        return res.text();
    })
    .then(function(data){

        console.log("VERIFY RESPONSE:", data);

        // ================= SUCCESS HANDLING =================
        if (
            data.indexOf("dashboard") !== -1 ||
            data.indexOf("success") !== -1 ||
            data.indexOf("Payment verified") !== -1
        ) {
            msg.innerText = "Payment successful. Redirecting...";
        } else {
            msg.innerText = "Verification completed. Redirecting...";
        }

        setTimeout(function(){
            window.location.href = "/dashboard.html";
        }, 1500);

    })
    .catch(function(err){

        console.log("VERIFY ERROR:", err);

        msg.innerText = "Verification failed. Please contact support.";
    });
}

</script>

</body>
</html>
