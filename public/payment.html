<!DOCTYPE html>
<html>
<head>
    <title>CBT Payment</title>
</head>

<body>

<h2>CBT Payment</h2>

<p>Amount: ₦500</p>

<button onclick="pay()" id="btn">
    Pay Now
</button>

<p id="msg"></p>

<script src="https://js.paystack.co/v1/inline.js"></script>

<script>

function pay() {

    const btn = document.getElementById("btn");
    const msg = document.getElementById("msg");

    const email = localStorage.getItem("userEmail");

    if (!email) {
        alert("Login required");
        window.location.href = "/login.html";
        return;
    }

    btn.disabled = true;
    msg.innerText = "Initializing payment...";

    let handler = PaystackPop.setup({

        key: "pk_test_98144baa944e535e4736ee9b97b2e6fbb28bcdcc",

        email: email,

        amount: 50000,

        currency: "NGN",

        callback: function(response) {

            msg.innerText = "Verifying payment...";

            window.location.href =
                "/verify?reference=" + response.reference;
        },

        onClose: function() {

            btn.disabled = false;
            msg.innerText = "Payment cancelled";
        }
    });

    handler.openIframe();
}

</script>

</body>
</html>
