<!DOCTYPE html>
<html>
<head>
    <title>CBT Payment</title>
</head>
<body>

<h2>CBT Payment</h2>

<p>Amount: ₦500</p>

<button onclick="pay()">
    Pay Now
</button>

<p id="msg"></p>

<script src="https://js.paystack.co/v1/inline.js"></script>

<script>

function pay() {

    // ================= USER CHECK =================

    const email =
        localStorage.getItem("userEmail");

    if (
        !email ||
        email === "null" ||
        email === "undefined"
    ) {

        alert("Login required");

        window.location.href = "/login.html";

        return;
    }

    // ================= PAYSTACK =================

    let handler = PaystackPop.setup({

        key:
        "pk_test_98144baa944e535e4736ee9b97b2e6fbb28bcdcc",

        email: email,

        // 🔥 ₦500 = 50000 kobo
        amount: 50000,

        currency: "NGN",

        // ================= SUCCESS =================

        callback: function(response) {

            document.getElementById("msg")
            .innerText =
            "Verifying payment...";

            // 🔥 IMPORTANT:
            // ONLY verification route used

            window.location.href =
                "/verify?reference=" +
                response.reference;
        },

        // ================= CANCEL =================

        onClose: function() {

            document.getElementById("msg")
            .innerText =
            "Payment cancelled";
        }
    });

    handler.openIframe();
}

</script>

</body>
</html>
