<h2>Practice Mode</h2>

<select id="subject">
<option>Mathematics</option>
<option>English</option>
<option>Physics</option>
<option>Chemistry</option>
</select>

<button onclick="load()">Start Practice</button>

<script>
async function load(){
let subject = document.getElementById("subject").value;

let res = await fetch("/api/practice?subject="+subject);
let data = await res.json();

console.log(data);
}
</script>
